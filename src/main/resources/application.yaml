spring:
  application:
    name: spring-ai-rag-assistant
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o
          temperature: 0.7
    embedding:
      transformer:
        onnx:
          modelUri: "https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main/onnx/model.onnx"
          tokenizerUri: "https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main/tokenizer.json"
    model:
      embedding: transformers
    vector:
      store:
        simple:
          save-file: vector-store.json

rag:
  ingestion:
    chunk-size: 1000
    chunk-overlap: 100
  retrieval:
    top-k: 3
    similarity-threshold: 0.5
