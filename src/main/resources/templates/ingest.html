<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingest Document</title>
</head>
<body>
<main>
    <h1>Ingest Document</h1>
    <p><a th:href="@{/}" href="/">Back to Home</a></p>

    <form th:action="@{/api/chat/ingest}" action="/api/chat/ingest" method="post" enctype="multipart/form-data">
        <label for="file">Choose file:</label>
        <input id="file" name="file" type="file" required>
        <button type="submit">Ingest File</button>
    </form>
</main>
</body>
</html>
